<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Test</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}
.page { display: none; }
.active { display: block; }

button {
  padding: 15px;
  margin: 10px;
  width: 90%;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="page active">
  <h1>🧠 IQ Test</h1>
  <button onclick="startTest()">Start Test</button>
</div>

<!-- QUESTIONS -->
<div id="quiz" class="page">
  <h2>Answer all questions</h2>
  <p>2 + 2 = ?</p>
  <button onclick="answer()">4</button>
</div>

<!-- SHARE PAGE -->
<div id="share" class="page">
  <h2>🔒 Share to Unlock Result</h2>
  <p>Share with 3 friends on WhatsApp</p>

  <button id="btn1" onclick="share(1)">Share 1</button>
  <button id="btn2" onclick="share(2)" style="display:none;">Share 2</button>
  <button id="btn3" onclick="share(3)" style="display:none;">Share 3</button>

  <br>
  <button id="resultBtn" onclick="showResult()" style="display:none;">
    🎉 View Result
  </button>
</div>

<!-- RESULT -->
<div id="result" class="page">
  <h1>🎉 Your IQ is 120</h1>
</div>

<script>
let shareStep = 0;
let lastOpenTime = 0;

// page switch
function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// start
function startTest(){
  go('quiz');
}

// answer
function answer(){
  go('share');
}

// share logic
function share(step){
  let link = window.location.href;

  let msg = "🧠 Try this IQ test 👉 " + link;

  lastOpenTime = Date.now();

  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");

  // detect return
  setTimeout(()=>{
    let now = Date.now();

    if(now - lastOpenTime > 2000){
      completeStep(step);
    } else {
      alert("Please complete sharing");
    }
  },2000);
}

// complete steps
function completeStep(step){
  if(step !== shareStep + 1) return;

  shareStep++;

  document.getElementById("btn"+step).disabled = true;

  if(step === 1){
    document.getElementById("btn2").style.display = "block";
  }
  if(step === 2){
    document.getElementById("btn3").style.display = "block";
  }
  if(step === 3){
    document.getElementById("resultBtn").style.display = "block";
  }
}

// result
function showResult(){
  go('result');
}
</script>

</body>
    </html>
